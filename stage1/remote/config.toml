# heretic v1.1.0 auto-reads THIS file (hardcoded name "config.toml") from its
# launch cwd (/root/stage1/remote). CLI flags in run_stage1.py (--model,
# --n-trials) override per-key; these are the loading knobs we don't pass on
# the CLI.
#
# FIX A: pinned to heretic v1.1.0, whose Settings has `device_map` but NOT
# `max_memory` or `quantization` (those fields do not exist in v1.1.0, so
# leaving them here would surface as configuration errors / be ignored).
# gpt-oss-120b is abliterated in BF16 across 2xH200: device_map="auto" shards
# the ~240GB of bf16 weights over both GPUs (spilling to CPU only if needed).
# heretic has no MXFP4 path, so bf16 is required for its direct-tensor surgery
# to reach the fused MoE-expert down_proj.
device_map = "auto"
